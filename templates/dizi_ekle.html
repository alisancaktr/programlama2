<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Yeni Dizi Ekle | Folio</title>
    <style>
        body { background-color: #0a0a0a; color: #ffffff; font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .form-card { background: #141414; padding: 40px; border-radius: 15px; border: 1px solid #222; width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #f1c40f; font-size: 24px; margin-bottom: 10px; }
        p { color: #888; font-size: 14px; margin-bottom: 30px; }
        .input-group { margin-bottom: 20px; position: relative; }
        input, select { width: 100%; padding: 12px; background: #1f1f1f; border: 1px solid #333; border-radius: 8px; color: white; box-sizing: border-box; margin-bottom: 10px; }
        input:focus { border-color: #f1c40f; outline: none; }
        
        /* Arama Sonuçları Paneli */
        #results { 
            background: #1f1f1f; border-radius: 8px; max-height: 250px; overflow-y: auto; 
            position: absolute; width: 100%; z-index: 100; border: 1px solid #333; display: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }
        .result-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 10px; font-size: 13px; transition: 0.2s; }
        .result-item:hover { background: #333; }
        .result-item img { width: 40px; border-radius: 4px; }

        .btn-save { background: #f1c40f; color: #000; width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; margin-top: 10px; }
        .btn-save:hover { background: #d4af37; transform: translateY(-2px); }
        .cancel-link { display: block; text-align: center; margin-top: 15px; color: #888; text-decoration: none; font-size: 14px; }
        label { display: block; margin-bottom: 5px; color: #f1c40f; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="form-card">
        <h1>📺 Dizi Ekle</h1>
        <p>Dünyadaki tüm dizileri keşfet ve listele.</p>
        
        <form method="POST" action="{% url 'dizi_ekle' %}">
            {% csrf_token %}
            
            <div class="input-group">
                <input type="text" id="dizi-ara" placeholder="Dizi adını yazmaya başlayın..." autocomplete="off">
                <div id="results"></div>
            </div>

            <input type="hidden" name="baslik" id="id_baslik">
            <input type="hidden" name="afis_url" id="id_afis_url">
            <input type="hidden" name="puan" id="id_puan">

            <div class="input-group">
                <label>Hangi Listeye Eklensin?</label>
                <select name="liste_durumu">
                    <option value="izlemek_istediklerim">⏳ İzlemek İstediklerim</option>
                    <option value="izlediklerim">✅ İzlediklerim</option>
                </select>
            </div>

            <button type="submit" class="btn-save">🚀 Listeme Kaydet</button>
            <a href="{% url 'diziler' %}" class="cancel-link">Vazgeç</a>
        </form>
    </div>

    <script>
        const searchInput = document.getElementById('dizi-ara');
    const resultsDiv = document.getElementById('results');
    const API_KEY = '27f9cf9c3719c9ff4926880180a9ebef'; // Buraya filmlerdeki anahtarı yapıştır

    searchInput.addEventListener('input', function() {
        const query = this.value;
        if (query.length > 2) {
            // DİKKAT: search/movie DEĞİL, search/tv kullanıyoruz
            fetch(`https://api.themoviedb.org/3/search/tv?api_key=${API_KEY}&query=${query}&language=tr-TR`)
                .then(response => response.json())
                .then(data => {
                    resultsDiv.innerHTML = '';
                
                    if (data.results && data.results.length > 0) {
                        resultsDiv.style.display = 'block';
                        data.results.slice(0, 5).forEach(tv => {
                            const div = document.createElement('div');
                            div.className = 'result-item'; // CSS'te bu class tanımlı olmalı
                        
                            // DİKKAT: tv.title değil, tv.name kullanıyoruz!
                            const title = tv.name; 
                            const year = tv.first_air_date ? tv.first_air_date.split('-')[0] : 'N/A';
                            const poster = tv.poster_path ? `https://image.tmdb.org/t/p/w92${tv.poster_path}` : 'https://via.placeholder.com/92x138';

                            div.innerHTML = `
                                <img src="${poster}" width="40">
                                <div>
                                    <strong>${title}</strong><br>
                                    <small>${year}</small>
                                </div>
                            `;

                            div.onclick = function() {
                                document.getElementById('id_baslik').value = title;
                                document.getElementById('id_afis_url').value = `https://image.tmdb.org/t/p/w500${tv.poster_path}`;
                                document.getElementById('id_puan').value = tv.vote_average;
                                searchInput.value = title;
                                resultsDiv.style.display = 'none';
                            };
                            resultsDiv.appendChild(div);
                        });
                    } else {
                        resultsDiv.innerHTML = '<div class="result-item">Sonuç bulunamadı.</div>';
                        resultsDiv.style.display = 'block';
                    }
                })
                .catch(err => console.error("API Hatası:", err));
        } else {
            resultsDiv.style.display = 'none';
        }
    });

        // Dışarı tıklayınca listeyi kapat
        document.addEventListener('click', function(e) {
            if (e.target !== searchInput) resultsDiv.style.display = 'none';
        });
    </script>
</body>
</html>
