<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>Folio — Giriş</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    body { background: #0d0d0d; color: #f0ece4; font-family: 'DM Sans', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .card { width: 380px; background: rgba(20,20,20,0.9); padding: 2.5rem; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px); }
    .logo { text-align: center; margin-bottom: 2rem; }
    .logo h1 { font-family: 'Playfair Display', serif; font-size: 3rem; margin: 0; color: #e8c97e; }
    .tabs { display: flex; gap: 10px; margin-bottom: 1.5rem; }
    .tab-btn { flex: 1; padding: 10px; background: rgba(255,255,255,0.05); border: none; color: #aaa; cursor: pointer; border-radius: 8px; }
    .tab-btn.active { background: #e8c97e; color: #000; }
    .form-panel { display: none; }
    .form-panel.active { display: block; }
    input { width: 100%; padding: 12px; margin: 8px 0; background: #222; border: 1px solid #333; color: #fff; border-radius: 8px; outline: none; }
    button.submit-btn { width: 100%; padding: 12px; background: #e8c97e; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    .msg { padding: 10px; margin-bottom: 10px; border-radius: 8px; text-align: center; font-size: 0.8rem; }
    .success { background: rgba(126, 207, 138, 0.2); color: #7ecf8a; }
    .error { background: rgba(217, 112, 112, 0.2); color: #d97070; }
  </style>
</head>
<body>

<div class="card">
  <div class="logo"><h1>Folio</h1></div>

  {% if messages %}
    {% for message in messages %}
      <div class="msg {{ message.tags }}">{{ message }}</div>
    {% endfor %}
  {% endif %}

  <div class="tabs">
    <button class="tab-btn active" id="l-btn" onclick="switchTab('login')">Giriş Yap</button>
    <button class="tab-btn" id="r-btn" onclick="switchTab('register')">Kayıt Ol</button>
  </div>

  <div class="form-panel active" id="panel-login">
    <form method="POST">
      {% csrf_token %}
      <input type="hidden" name="action" value="login">
      <input type="email" name="email" placeholder="E-posta" required>
      <input type="password" name="password" placeholder="Şifre" required>
      <button type="submit" class="submit-btn">Giriş Yap</button>
    </form>
  </div>

  <div class="form-panel" id="panel-register">
    <form method="POST">
      {% csrf_token %}
      <input type="hidden" name="action" value="register">
      <input type="text" name="username" placeholder="Kullanıcı Adı" required>
      <input type="email" name="email" placeholder="E-posta" required>
      <input type="password" name="password" placeholder="Şifre" required>
      <button type="submit" class="submit-btn">Hesap Oluştur</button>
    </form>
  </div>
</div>

<script>
  function switchTab(t) {
    document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('panel-' + t).classList.add('active');
    document.getElementById(t.charAt(0) + '-btn').classList.add('active');
  }
</script>
</body>
</html>
